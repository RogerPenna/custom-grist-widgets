<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicators Grid Widget</title>
    <script src="https://grist.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link rel="stylesheet" href="../libraries/tabulator/tabulator.min.css?v=1.0.8">
    <link rel="stylesheet" href="../libraries/external/coloris/coloris.min.css?v=1.0.8" />
    <link rel="stylesheet" href="../libraries/grist-config-manager/ConfigManagerComponent.css?v=1.0.8">
    <link rel="stylesheet" href="../libraries/grist-style-utils/icons.css?v=1.0.8">
    <link rel="stylesheet" href="style.css?v=1.0.8">
    <script src="../libraries/tabulator/tabulator.min.js?v=1.0.8"></script>
</head>
<body>
    <div id="debug-log" style="display: none; position: fixed; bottom: 0; left: 0; background: rgba(0,0,0,0.8); color: lime; font-family: monospace; font-size: 10px; padding: 5px; z-index: 99999;"></div>

    <!-- SVG Sprite for Icons -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
      <symbol id="icon-edit" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
      <symbol id="icon-link" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13.213 9.787a3.391 3.391 0 0 0-4.795 0l-3.425 3.426a3.39 3.39 0 0 0 4.795 4.794l.321-.304m-.321-4.49a3.39 3.39 0 0 0 4.795 0l3.424-3.426a3.39 3.39 0 0 0-4.794-4.795l-1.028.961"/></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 13v-2a1 1 0 0 0-1-1h-.757l-.707-1.707.535-.536a1 1 0 0 0 0-1.414l-1.414-1.414a1 1 0 0 0-1.414 0l-.536.535L14 4.757V4a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v.757l-1.707.707-.536-.535a1 1 0 0 0-1.414 0L4.929 6.343a1 1 0 0 0 0 1.414l.536.536L4.757 10H4a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h.757l.707 1.707-.535.536a1 1 0 0 0 0 1.414l1.414 1.414a1 1 0 0 0 1.414 0l.536-.535 1.707.707V20a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-.757l1.707-.708.536.536a1 1 0 0 0 1.414 0l1.414-1.414a1 1 0 0 0 0-1.414l-.535-.536.707-1.707H20a1 1 0 0 0 1-1Z"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></symbol>
    </svg>

    <div id="nav-bar-container" style="display:none; padding: 10px 15px; background: #fff; border-bottom: 1px solid #e2e8f0; align-items: center; gap: 10px; z-index: 100;">
        <button id="back-button" style="display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 12px; border: 1px solid #cbd5e1; background: #fff; color: #475569;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Voltar
        </button>
        <div id="breadcrumb-area" style="font-size: 12px; font-weight: 600; color: #64748b;"></div>
    </div>

    <div id="widget-header">
        <div class="header-left">
            <div id="grouper-container" style="display: none; align-items: center; gap: 8px; margin-right: 15px;">
                <span style="font-size: 11px; font-weight: bold; color: #666;">AGRUPAR POR:</span>
                <select id="grouper-select" class="header-select"></select>
            </div>
            <select id="year-selector" class="header-select"></select>
        </div>
        <div class="header-right">
            <span id="widget-version" style="font-size: 10px; color: #999; margin-right: 10px;">v1.0.12</span>
            <button id="config-btn" class="icon-btn">⚙️</button>
        </div>
    </div>

    <div id="main-container">
        <div id="indicators-view" class="indicators-grid"></div>
    </div>

    <!-- Modal para Detalhes (Gráfico) -->
    <div id="detail-modal" class="grf-modal-overlay">
        <div class="grf-modal-container">
            <div class="grf-modal-header">
                <h3 id="modal-title">Detalhes do Indicador</h3>
                <button id="close-modal" class="grf-modal-close">&times;</button>
            </div>
            <div id="modal-content" class="grf-modal-body"></div>
        </div>
    </div>

    <script type="module" src="script.js?v=1.0.14"></script>
</body>
</html>
