<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../libraries/tabulator/tabulator.min.css">
    <link rel="stylesheet" href="../libraries/external/coloris/coloris.min.css" />
    <link rel="stylesheet" href="../libraries/grist-config-manager/ConfigManagerComponent.css">
    <link rel="stylesheet" href="../libraries/grist-style-utils/icons.css">

    <script src="../libraries/tabulator/tabulator.min.js"></script>
</head>

    <div id="widget-header">
        <div class="header-left">
            <select id="year-selector"></select>
        </div>
        <div class="header-right">
            <button id="config-btn" class="icon-btn">⚙️</button>
        </div>
    </div>
    <div id="main-container">
        <div id="indicator-list" class="sidebar"></div>
        <div id="indicator-detail" class="content">
            <div class="status-placeholder">Selecione um indicador para visualizar os detalhes.</div>
        </div>
    </div>

    <script type="module" src="script.js"></script>

</html>
