<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Viewer - Modo Robusto</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../libraries/grist-config-manager/ConfigManagerComponent.css">
    <link rel="stylesheet" href="../libraries/grist-style-utils/icons.css">
    <link rel="stylesheet" href="../libraries/grist-style-utils/night-theme.css">
    <link href="../libraries/tabulator/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="../libraries/tabulator/tabulator.min.js"></script>
    
    <!-- CARREGAMENTO CLÁSSICO DA DRAWER (Com Cache-Buster via JS para ser dinâmico) -->
    <script>
        document.write('<script src="../libraries/grist-drawer-component/drawer-component.js?v=' + Date.now() + '"><\/script>');
    </script>

    <style>
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; background-color: #f7f7f7; }
        #app-container { width: 100%; height: 100%; overflow-y: auto; padding: 0; box-sizing: border-box; }
        #debug-log { position: fixed; bottom: 10px; right: 10px; width: 350px; max-height: 250px; background: rgba(0,0,0,0.9); color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-radius: 8px; z-index: 10000; border: 1px solid #444; }
        #clear-log-btn { position: absolute; top: 5px; right: 5px; background: #444; color: white; border: none; border-radius: 3px; font-size: 9px; cursor: pointer; padding: 2px 5px; }
        .status-placeholder { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 18px; font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div id="debug-log"><button id="clear-log-btn" onclick="location.reload()">Reset</button></div>
    <div id="app-container"><div class="status-placeholder">Aguardando...</div></div>

    <script type="module">
        import { GristTableLens } from '../libraries/grist-table-lens/grist-table-lens.js';
        import { CardSystem } from '../libraries/grist-card-system/CardSystem.js';
        import { subscribe } from '../libraries/grist-event-bus/grist-event-bus.js';
        import { GristRestAdapter } from '../libraries/headless-rest-adapter.js';
        import { HeadlessTableLens } from '../libraries/headless-table-lens.js';
        import { renderField } from '../libraries/grist-field-renderer/grist-field-renderer.js';

        // Disponibiliza o renderer para a Drawer clássica
        window.GristRenderer = { renderField };

        const logEl = document.getElementById('debug-log');
        function log(msg) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        const appContainer = document.getElementById('app-container');
        const urlParams = new URLSearchParams(window.location.search);
        const urlConfigId = urlParams.get('configId');
        const urlDocId = urlParams.get('docId') || 'qiVPiRA3ULcU';

        let tableLens;
        let currentConfigId = urlConfigId || null;

        if (urlConfigId) {
            tableLens = new HeadlessTableLens(new GristRestAdapter({
                gristUrl: window.location.origin + '/grist-proxy',
                docId: urlDocId,
                apiKey: 'none'
            }));
        } else {
            tableLens = new GristTableLens(window.grist);
        }

        async function updateUI() {
            if (!currentConfigId) return;
            try {
                const configRecord = await tableLens.findRecord('Grf_config', { configId: currentConfigId });
                if (configRecord) {
                    const config = JSON.parse(configRecord.configJson);
                    const records = await tableLens.fetchTableRecords(config.tableId);
                    const schema = await tableLens.getTableSchema(config.tableId);
                    appContainer.innerHTML = '';
                    CardSystem.renderCards(appContainer, records, { ...config, tableLens }, schema);
                }
            } catch (e) { log(`ERRO: ${e.message}`); }
        }

        subscribe('grf-card-clicked', async (data) => {
            log(`CLIQUE ID ${data.recordId}`);
            if (window.GristDrawer) {
                await window.GristDrawer.open(data.tableId, data.recordId, { tableLens: tableLens });
            } else {
                log("ERRO: GristDrawer não carregou no cabeçalho.");
            }
        });

        window.grist.ready({ requiredAccess: 'full' });
        if (urlConfigId) updateUI();
        window.grist.onOptions(opt => {
            if (opt?.configId && opt.configId !== currentConfigId) {
                currentConfigId = opt.configId;
                updateUI();
            }
        });
    </script>
</body>
</html>
