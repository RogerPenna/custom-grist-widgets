<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grist Icon Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .header { position: sticky; top: 0; background: white; padding: 15px; border-bottom: 2px solid #ddd; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .add-new-section { background: #eef2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccd; display: none; flex-direction: column; gap: 10px; }
        .add-new-section.active { display: flex; }
        .add-new-inputs { display: flex; flex-direction: column; gap: 10px; }
        .add-new-inputs input, .add-new-inputs textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 12px; }
        .add-new-inputs textarea { height: 80px; resize: vertical; }

        .controls-filters { display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        .controls-filters input, .controls-filters select { padding: 4px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; height: 28px; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; margin-top: 20px; }
        .icon-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; align-items: center; gap: 20px; transition: transform 0.2s; position: relative; }
        .icon-card:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; }
        .btn-mini { padding: 2px 6px; font-size: 10px; border-radius: 3px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        .btn-mini.danger:hover { background: #dc3545; color: #fff; border-color: #dc3545; }
        .btn-mini.primary:hover { background: #007bff; color: #fff; border-color: #007bff; }
        
        .path-editor { margin-top: 10px; display: none; width: 100%; flex-direction: column; gap: 5px; grid-column: span 2; }
        .path-editor textarea { width: 100%; height: 60px; font-family: monospace; font-size: 11px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .preview-box { width: 64px; height: 64px; border: 1px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #fff; flex-shrink: 0; }
        .preview-box svg { width: 48px; height: 48px; }
        
        .icon-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .icon-name { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .control-group { display: flex; align-items: center; gap: 5px; }
        input[type="number"] { width: 45px; }
        
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: 1px solid #007bff; background: #007bff; color: white; font-weight: bold; font-size: 13px; }
        button.secondary { background: #6c757d; border-color: #6c757d; }
        button.success { background: #28a745; border-color: #28a745; }
        
        #json-output { width: 100%; height: 200px; margin-top: 20px; display: none; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #007bff; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h2 style="margin:0;">Grist Icon Manager <span style="font-size: 12px; vertical-align: middle; opacity: 0.6;">v1.3 Studio</span></h2>
        <div class="controls-global">
            <button onclick="toggleAddNew()" class="success">+ Add New Icon</button>
            <button onclick="generateJSON()">Generate Config JSON</button>
            <button onclick="generateSVG()">Generate SVG Symbols</button>
            <button class="secondary" onclick="window.location.reload()">Reset All</button>
        </div>
    </div>

    <div id="add-new-panel" class="add-new-section">

        <div class="add-new-inputs">
            <input type="text" id="new-icon-id" placeholder="Icon ID (e.g. icon-home) [Auto-detects from SVG class]">
            <textarea id="new-icon-path" placeholder="Paste full <svg> code here..."></textarea>
        </div>
        <div style="display:flex; justify-content: flex-end; gap:10px;">
            <button onclick="addNewIcon()" class="success">Add to Preview</button>
            <button onclick="toggleAddNew()" class="secondary">Cancel</button>
        </div>
    </div>

    <div class="controls-filters">
        <input type="text" id="search-input" placeholder="Search name..." oninput="filterIcons()">
        <select id="filter-fill" onchange="filterIcons()">
            <option value="all">All Fill</option>
            <option value="on">Fill On</option>
            <option value="off">Fill Off</option>
        </select>
        <select id="filter-stroke" onchange="filterIcons()">
            <option value="all">All Stroke</option>
            <option value="on">Stroke On</option>
            <option value="off">Stroke Off</option>
        </select>
        <div style="display:flex; align-items:center; gap:5px;">
            <label style="font-size:12px;">Width:</label>
            <input type="number" id="filter-width" placeholder="Any" step="0.1" oninput="filterIcons()" style="width:60px;">
        </div>
    </div>
</div>

<textarea id="json-output" placeholder="Config JSON will appear here..."></textarea>

<div id="icon-container" class="icon-grid">
    <p>Loading icons...</p>
</div>

<div id="svg-library-container" style="display:none;"></div>

<script>
    const svgUrl = './icons.svg';
    let iconConfigs = {};

    function toggleAddNew() {
        const panel = document.getElementById('add-new-panel');
        panel.classList.toggle('active');
        if (panel.classList.contains('active')) document.getElementById('new-icon-id').focus();
    }

    async function loadIcons() {
        const response = await fetch(svgUrl);
        const text = await response.text();
        const container = document.getElementById('svg-library-container');
        container.innerHTML = text;

        const symbols = container.querySelectorAll('symbol');
        const grid = document.getElementById('icon-container');
        grid.innerHTML = '';

        symbols.forEach(symbol => {
            addIconCard(symbol.id, symbol.innerHTML);
        });
    }

    function addIconCard(id, innerHTML, isNew = false) {
        const grid = document.getElementById('icon-container');
        
        if (isNew) {
            const library = document.getElementById('svg-library-container').querySelector('svg');
            const newSymbol = document.createElementNS('http://www.w3.org/2000/svg', 'symbol');
            newSymbol.id = id;
            newSymbol.setAttribute('viewBox', '0 0 24 24');
            newSymbol.innerHTML = innerHTML;
            library.appendChild(newSymbol);
        }

        const symbol = document.getElementById(id);
        const allPaths = symbol.querySelectorAll('path');
        const firstPath = allPaths[0];
        const currentD = Array.from(allPaths).map(p => p.getAttribute('d')).join(' ');

        // Initial state analysis
        const hasFill = firstPath ? (firstPath.getAttribute('fill') !== 'none' && firstPath.hasAttribute('fill')) : false;
        const hasStroke = firstPath ? (firstPath.hasAttribute('stroke') && firstPath.getAttribute('stroke') !== 'none') : false;
        const strokeWidth = firstPath ? (firstPath.getAttribute('stroke-width') || 2) : 2;

        iconConfigs[id] = {
            fill: hasFill,
            stroke: hasStroke,
            strokeWidth: parseFloat(strokeWidth)
        };

        const card = document.createElement('div');
        card.className = 'icon-card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div class="card-actions">
                <button class="btn-mini primary" onclick="togglePathEditor('${id}')" title="Edit Path Data">Edit</button>
                <button class="btn-mini danger" onclick="deleteIcon('${id}')" title="Remove from Preview">×</button>
            </div>
            <div class="preview-box" id="preview-${id}">
                <svg><use href="#${id}"></use></svg>
            </div>
            <div class="icon-info">
                <span class="icon-name" title="${id}">${id}</span>
                <div class="controls">
                    <div class="control-group">
                        <input type="checkbox" id="fill-${id}" ${hasFill ? 'checked' : ''} onchange="updateIcon('${id}')">
                        <label for="fill-${id}">Fill</label>
                    </div>
                    <div class="control-group">
                        <input type="checkbox" id="stroke-${id}" ${hasStroke ? 'checked' : ''} onchange="updateIcon('${id}')">
                        <label for="stroke-${id}">Stroke</label>
                    </div>
                    <div class="control-group" style="grid-column: span 2;">
                        <label>Width:</label>
                        <input type="number" id="width-${id}" value="${iconConfigs[id].strokeWidth}" step="0.1" min="0" oninput="updateIcon('${id}')">
                    </div>
                </div>
                <div id="path-editor-${id}" class="path-editor">
                    <label style="font-size:10px; font-weight:bold;">Path Data (d):</label>
                    <textarea id="path-data-${id}" oninput="saveManualPath('${id}')">${currentD}</textarea>
                </div>
            </div>
        `;
        grid.appendChild(card);
        updateIcon(id);
    }

    function deleteIcon(id) {
        if (!confirm(`Remove ${id} from preview?`)) return;
        document.getElementById(`card-${id}`).remove();
        const symbol = document.getElementById(id);
        if (symbol) symbol.remove();
        delete iconConfigs[id];
    }

    function togglePathEditor(id) {
        const editor = document.getElementById(`path-editor-${id}`);
        editor.style.display = (editor.style.display === 'flex' ? 'none' : 'flex');
    }

    function saveManualPath(id) {
        const newD = document.getElementById(`path-data-${id}`).value;
        const symbol = document.getElementById(id);
        symbol.innerHTML = `<path d="${newD}" />`;
        updateIcon(id);
    }

    function generateSVG() {
        const output = document.getElementById('json-output');
        let svgMarkup = '';
        const symbols = document.getElementById('svg-library-container').querySelectorAll('symbol');
        symbols.forEach(s => {
            svgMarkup += `  <symbol id="${s.id}" viewBox="0 0 24 24">${s.innerHTML}</symbol>\n`;
        });
        output.value = svgMarkup;
        output.style.display = 'block';
        output.select();
        document.execCommand('copy');
        alert('SVG Symbols copied to clipboard!');
    }

    function convertShapeToPath(el) {
        const type = el.tagName.toLowerCase();
        if (type === 'path') return el.getAttribute('d');
        
        if (type === 'rect') {
            const x = parseFloat(el.getAttribute('x') || 0), y = parseFloat(el.getAttribute('y') || 0);
            const w = parseFloat(el.getAttribute('width') || 0), h = parseFloat(el.getAttribute('height') || 0);
            return `M ${x} ${y} h ${w} v ${h} h -${w} Z`;
        }
        if (type === 'circle') {
            const cx = parseFloat(el.getAttribute('cx') || 0), cy = parseFloat(el.getAttribute('cy') || 0), r = parseFloat(el.getAttribute('r') || 0);
            return `M ${cx} ${cy - r} a ${r} ${r} 0 1 0 0 ${2 * r} a ${r} ${r} 0 1 0 0 -${2 * r}`;
        }
        if (type === 'line') {
            const x1 = parseFloat(el.getAttribute('x1') || 0), y1 = parseFloat(el.getAttribute('y1') || 0);
            const x2 = parseFloat(el.getAttribute('x2') || 0), y2 = parseFloat(el.getAttribute('y2') || 0);
            return `M ${x1} ${y1} L ${x2} ${y2}`;
        }
        return '';
    }

    function addNewIcon() {
        let idInput = document.getElementById('new-icon-id');
        let id = idInput.value.trim();
        let svgInput = document.getElementById('new-icon-path').value.trim();

        if (!svgInput) return alert('Paste some SVG code first!');

        const parser = new DOMParser();
        const doc = parser.parseFromString(svgInput, 'image/svg+xml');
        const svgEl = doc.querySelector('svg');

        if (!svgEl) return alert('Invalid SVG code.');

        if (!id) {
            const classes = svgEl.getAttribute('class');
            const match = classes ? classes.match(/(?:lucide|feather)-([a-z0-9-]+)/) : null;
            id = match ? 'icon-' + match[1] : 'icon-new';
            idInput.value = id;
        }
        if (!id.startsWith('icon-')) id = 'icon-' + id;

        // Process all renderable elements (preserving their separation)
        const elements = svgEl.querySelectorAll('path, rect, circle, line, polyline, polygon');
        let combinedinnerHTML = '';
        elements.forEach(el => {
            const d = convertShapeToPath(el);
            if (d) combinedinnerHTML += `<path d="${d}" />`;
        });

        if (iconConfigs[id]) return alert('Icon ID already exists!');

        addIconCard(id, combinedinnerHTML, true);
        
        idInput.value = '';
        document.getElementById('new-icon-path').value = '';
        toggleAddNew();
        window.scrollTo(0, document.body.scrollHeight);
    }

    function updateIcon(id) {
        const fill = document.getElementById(`fill-${id}`).checked;
        const stroke = document.getElementById(`stroke-${id}`).checked;
        const width = document.getElementById(`width-${id}`).value;

        iconConfigs[id] = { fill, stroke, strokeWidth: parseFloat(width) };

        const symbol = document.getElementById(id);
        const paths = symbol.querySelectorAll('path');
        
        paths.forEach(p => {
            p.setAttribute('fill', fill ? 'currentColor' : 'none');
            if (stroke) {
                p.setAttribute('stroke', 'currentColor');
                p.setAttribute('stroke-width', width);
                p.setAttribute('stroke-linecap', 'round');
                p.setAttribute('stroke-linejoin', 'round');
            } else {
                p.removeAttribute('stroke');
                p.removeAttribute('stroke-width');
            }
        });

        const preview = document.getElementById(`preview-${id}`);
        preview.innerHTML = `<svg><use href="#${id}"></use></svg>`;
    }

    function generateJSON() {
        const output = document.getElementById('json-output');
        output.value = JSON.stringify(iconConfigs, null, 2);
        output.style.display = 'block';
        output.select();
        document.execCommand('copy');
        alert('JSON Config copied to clipboard!');
    }

    function generateSVG() {
        const output = document.getElementById('json-output');
        let svgMarkup = '';
        const symbols = document.getElementById('svg-library-container').querySelectorAll('symbol');
        symbols.forEach(s => {
            svgMarkup += `  <symbol id="${s.id}" viewBox="0 0 24 24">${s.innerHTML}</symbol>\n`;
        });
        output.value = svgMarkup;
        output.style.display = 'block';
        output.select();
        document.execCommand('copy');
        alert('SVG Symbols copied to clipboard!');
    }

    function filterIcons() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const fillFilter = document.getElementById('filter-fill').value;
        const strokeFilter = document.getElementById('filter-stroke').value;
        const widthFilter = document.getElementById('filter-width').value;

        const cards = document.querySelectorAll('.icon-card');
        cards.forEach(card => {
            const id = card.querySelector('.icon-name').innerText.toLowerCase();
            const fill = document.getElementById(`fill-${id}`).checked;
            const stroke = document.getElementById(`stroke-${id}`).checked;
            const width = document.getElementById(`width-${id}`).value;

            const matchesQuery = id.includes(query);
            const matchesFill = fillFilter === 'all' || (fillFilter === 'on' && fill) || (fillFilter === 'off' && !fill);
            const matchesStroke = strokeFilter === 'all' || (strokeFilter === 'on' && stroke) || (strokeFilter === 'off' && !stroke);
            const matchesWidth = !widthFilter || parseFloat(width) === parseFloat(widthFilter);

            card.style.display = (matchesQuery && matchesFill && matchesStroke && matchesWidth) ? 'flex' : 'none';
        });
    }

    loadIcons();
</script>

</body>
</html>
