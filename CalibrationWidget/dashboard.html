<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Metrológico de Calibração</title>
    
    <script>
        const messageSources = new Map();
        
        // Proxy messages immediately on window load to prevent race conditions during iframe initialization
        window.addEventListener('message', (event) => {
            if (!event.data) return;
            
            console.log("[Dashboard Head Proxy] Received:", event.data.action, event.data);

            // Forward data updates to dashboard.js if it loaded
            if (event.data.action === 'instruments-data-loaded') {
                if (window.onInstrumentsDataLoaded) {
                    window.onInstrumentsDataLoaded(event.data);
                } else {
                    window.cachedInstrumentsData = event.data;
                }
                return;
            }

            if (event.data.action === 'dashboard-config-loaded') {
                if (window.onDashboardConfigLoaded) {
                    window.onDashboardConfigLoaded(event.data.config);
                } else {
                    window.cachedDashboardConfig = event.data.config;
                }
                return;
            }

            // Ignore internal actions
            if (event.data.action === 'open-instrument-drawer' || 
                event.data.action === 'update-instrument-stage' || 
                event.data.action === 'table-lens-request' ||
                event.data.action === 'table-lens-response') return;

            // Relay Grist Plugin messages correctly using request tracking to prevent double handshake conflict
            if (event.source === window.parent) {
                // This is a reply from Grist
                const reqId = event.data.reqId;
                const targetIframe = messageSources.get(reqId);
                if (targetIframe && targetIframe.contentWindow) {
                    targetIframe.contentWindow.postMessage(event.data, '*');
                } else {
                    // Fallback: send to all iframes if reqId is not found
                    document.querySelectorAll('iframe').forEach(iframe => {
                        if (iframe.contentWindow) {
                            iframe.contentWindow.postMessage(event.data, '*');
                        }
                    });
                }
            } else {
                // This is a request from a nested iframe to Grist
                const reqId = event.data.reqId;
                if (reqId !== undefined) {
                    const iframe = Array.from(document.querySelectorAll('iframe'))
                        .find(f => f.contentWindow === event.source);
                    if (iframe) {
                        messageSources.set(reqId, iframe);
                    }
                }
                window.parent.postMessage(event.data, '*');
            }
        });
    </script>
    
    <!-- External Styles -->
    <link rel="stylesheet" href="../libraries/grist-style-utils/icons.css">
    <link rel="stylesheet" href="../libraries/grist-drawer-component/drawer-style.css?v=1.3.29">
    
    <style>
        :root {
            --primary: #2c5e5a;
            --primary-light: #f0f7f6;
            --primary-hover: #1f4542;
            --accent: #2e7d32;
            --bg-canvas: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #cbd5e1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glassmorphism Header */
        header {
            background: rgba(44, 94, 90, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-title svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        .header-actions {
            display: flex;
            align-items: center;
        }

        .btn-dash-config {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
        }

        .btn-dash-config:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            gap: 5px;
            flex: 1;
            justify-content: center;
            margin: 0 20px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Main Viewport */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-pane {
            display: none;
            width: 100%;
            height: 100%;
        }

        .tab-pane.active {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-canvas);
        }

        /* Kanban Board Styles */
        .kanban-board {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
            flex: 1;
            align-items: flex-start;
        }

        .kanban-column {
            background: #e2e8f0;
            border-radius: 8px;
            width: 280px;
            min-width: 280px;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            border: 1px solid #cbd5e1;
        }

        .kanban-column-header {
            padding: 12px;
            font-weight: 700;
            font-size: 13px;
            color: #475569;
            border-bottom: 2px solid #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-count {
            background: #cbd5e1;
            color: #475569;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .kanban-cards-container {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            min-height: 100px;
        }

        /* Instrument Card */
        .instrument-card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
            cursor: grab;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .instrument-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .instrument-card:active {
            cursor: grabbing;
        }

        .card-tag {
            font-weight: 700;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .card-details {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 6px;
            margin-top: 6px;
        }

        .card-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .card-badge-status {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            background: #e2e8f0;
            color: #475569;
        }
        
        .card-badge-status.disponivel {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .card-badge-status.laboratorio {
            background: #ffeecb;
            color: #b77900;
        }

        /* Sortable ghost/drag configurations */
        .sortable-ghost {
            opacity: 0.4;
            border: 2px dashed var(--primary);
        }

        .sortable-chosen {
            background: #f8fafc;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <svg viewBox="0 0 24 24"><path d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M17,10H7V12H17V10M17,14H7V16H17V14M17,6H7V8H17V6Z" /></svg>
            <h1>Painel Metrológico</h1>
        </div>
        <div class="tabs-nav"></div>
        <div class="header-actions">
            <button class="btn-dash-config" id="btn-dash-config" title="Configurar Dashboard">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>
    </header>
    <main>
        <!-- Tab 1: Inventário Geral -->
        <div id="pane-inventario" class="tab-pane active">
            <iframe src="../UniversalViewer/index.html?configId=tableinstruments"></iframe>
        </div>

        <!-- Tab 2: Fluxo Kanban -->
        <div id="pane-fluxo" class="tab-pane">
            <div class="kanban-board" id="kanban-board-container">
                <!-- Columns populated dynamically -->
            </div>
        </div>

        <!-- Tab 3: Importador -->
        <div id="pane-importador" class="tab-pane">
            <iframe src="./importador-calibracoes.html"></iframe>
        </div>

        <!-- Tab 4: Certificados Terceiros -->
        <div id="pane-certificados" class="tab-pane">
            <iframe src="../UniversalViewer/index.html?configId=tableexternalcalibrations"></iframe>
        </div>
    </main>

    <!-- JS Scripts -->
    <script src="../libraries/external/sortable.min.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
