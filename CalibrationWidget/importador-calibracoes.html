<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importador de Calibrações XML/CAL</title>
    
    <!-- CSS Styles -->
    <style>
        :root {
            --primary-color: #2c5e5a;
            --primary-hover: #3d7c76;
            --bg-color: #f7f9fa;
            --border-color: #cfd8dc;
            --text-color: #37474f;
            --success-color: #2e7d32;
            --error-color: #c62828;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }
        .container {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #546e7a;
        }
        select, input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
        }
        .upload-area {
            border: 2px dashed var(--primary-color);
            padding: 30px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background-color: #f0f7f6;
            transition: background-color 0.2s;
            margin-top: 15px;
        }
        .upload-area:hover {
            background-color: #e0f2f1;
        }
        .upload-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .upload-text {
            font-weight: bold;
            color: var(--primary-color);
        }
        .upload-subtext {
            font-size: 12px;
            color: #78909c;
            margin-top: 5px;
        }
        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            display: none;
        }
        .status-box.success {
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: var(--success-color);
            display: block;
        }
        .status-box.error {
            background-color: #ffeedd;
            border: 1px solid #ffd1a4;
            color: #b77900;
            display: block;
        }
        .log-area {
            margin-top: 15px;
            background: #fafafa;
            border: 1px solid #eceff1;
            padding: 10px;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            display: none;
        }
    </style>
    
    <!-- External JS Libraries -->
    <script src="../libraries/external/grist-plugin-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>📥 Importar Calibração (.CAL / XML)</h2>
        <p style="color: #607d8b; font-size: 13px; margin-top: -5px;">
            Arraste um arquivo de calibração para realizar o parse e salvar no banco automaticamente com a validação calculada.
        </p>

        <div class="form-group">
            <label for="instrument-select">Selecione o Instrumento</label>
            <select id="instrument-select">
                <option value="">-- Carregando Instrumentos... --</option>
            </select>
        </div>

        <div class="upload-area" id="upload-zone">
            <div class="upload-icon">📥</div>
            <div class="upload-text">Arraste o arquivo ou clique para selecionar</div>
            <div class="upload-subtext">Formatos suportados: .CAL (Zipped XML) ou .XML</div>
            <input type="file" id="file-input" accept=".cal,.xml" style="display: none;">
        </div>

        <div id="status-message" class="status-box"></div>
        <div id="log-console" class="log-area"></div>
    </div>

    <!-- Script de Negócio -->
    <script type="module">
        import { GristTableLens } from '../libraries/grist-table-lens/grist-table-lens.js';
        import { GristDataWriter } from '../libraries/grist-data-writer.js';

        let tableLens = null;
        let dataWriter = null;
        let instrumentsList = [];
        let selectedInstrumentId = null;

        tableLens = new GristTableLens(window.grist);
        dataWriter = new GristDataWriter(window.grist);

        // Bind selectors
        const instSelect = document.getElementById('instrument-select');
        instSelect.addEventListener('change', (e) => {
            selectedInstrumentId = e.target.value ? parseInt(e.target.value, 10) : null;
        });

        // Uploader Dropzone handlers
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.backgroundColor = '#e0f2f1'; });
        uploadZone.addEventListener('dragleave', () => { uploadZone.style.backgroundColor = '#f0f7f6'; });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.style.backgroundColor = '#f0f7f6';
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                processFile(fileInput.files[0]);
            }
        });

        // Start Grist
        grist.ready({ requiredAccess: 'full' });

        // Listen to selected record or load instruments list
        grist.onRecord(async (record) => {
            if (record && record.id) {
                selectedInstrumentId = record.id;
                await refreshInstrumentsDropdown(record.id);
            } else {
                await refreshInstrumentsDropdown();
            }
        });

        async function refreshInstrumentsDropdown(selectedId = null) {
            const instSelect = document.getElementById('instrument-select');
            try {
                instrumentsList = await tableLens.fetchTableRecords('INSTRUMENTS');
                instSelect.innerHTML = '<option value="">-- Selecione o Instrumento --</option>';
                instrumentsList.forEach(inst => {
                    const opt = document.createElement('option');
                    opt.value = inst.id;
                    opt.textContent = `${inst.CODE} - ${inst.ID_INSTRUMENT_TYPE || ''} (${inst.ID_SITUATION || ''})`;
                    if (selectedId && String(inst.id) === String(selectedId)) {
                        opt.selected = true;
                        selectedInstrumentId = inst.id;
                    }
                    instSelect.appendChild(opt);
                });
            } catch (e) {
                console.error("Failed to load instruments list:", e);
                instSelect.innerHTML = '<option value="">Erro ao carregar lista</option>';
            }
        }

        function writeLog(msg) {
            const consoleEl = document.getElementById('log-console');
            consoleEl.style.display = 'block';
            consoleEl.textContent += msg + '\n';
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function showMessage(msg, isError = false) {
            const box = document.getElementById('status-message');
            box.textContent = msg;
            box.className = 'status-box ' + (isError ? 'error' : 'success');
        }

        async function processFile(file) {
            if (!selectedInstrumentId) {
                alert("Por favor, selecione o Instrumento correspondente antes de fazer o upload.");
                return;
            }
            
            document.getElementById('log-console').textContent = '';
            writeLog(`Iniciando processamento do arquivo: ${file.name}`);
            
            const isCal = file.name.endsWith('.cal');
            const isXml = file.name.endsWith('.xml');
            
            if (isCal) {
                try {
                    const zip = await JSZip.loadAsync(file);
                    let xmlFile = null;
                    Object.keys(zip.files).forEach(name => {
                        if (name.toLowerCase().endsWith('.xml')) xmlFile = zip.files[name];
                    });
                    
                    if (xmlFile) {
                        const xmlText = await xmlFile.async("string");
                        await importXml(xmlText);
                    } else {
                        showMessage("Arquivo .XML não encontrado dentro do pacote .CAL", true);
                    }
                } catch (e) {
                    showMessage("Erro ao ler pacote .CAL: " + e.message, true);
                }
            } else if (isXml) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await importXml(e.target.result);
                };
                reader.readAsText(file);
            } else {
                showMessage("Tipo de arquivo não suportado. Use apenas .CAL ou .XML", true);
            }
        }

        async function importXml(xmlText) {
            try {
                writeLog("Parsing XML...");
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Parse headers
                const certCode = xmlDoc.querySelector("NumeroCertificado, Numero, Code")?.textContent || "Cert-" + Date.now();
                const dateStr = xmlDoc.querySelector("DataCalibracao, Data, Date")?.textContent || new Date().toISOString().split('T')[0];
                const labName = xmlDoc.querySelector("Laboratorio, Laboratory, Lab")?.textContent || "Laboratório de Calibração";
                const notes = xmlDoc.querySelector("Observacoes, Notes, Description")?.textContent || "Importação automática de XML";
                
                writeLog(`Certificado: ${certCode}`);
                writeLog(`Data: ${dateStr}`);
                writeLog(`Lab: ${labName}`);
                
                // Parse tables and points
                const tables = xmlDoc.querySelectorAll("TabelaResultado, Table, Tabela");
                if (tables.length === 0) {
                    throw new Error("Nenhuma Tabela de Resultados encontrada no XML.");
                }

                const parsedTables = [];
                tables.forEach((t, idx) => {
                    const name = t.querySelector("Nome, Name")?.textContent || `Tabela ${idx + 1}`;
                    const points = [];
                    const rows = t.querySelectorAll("Ponto, Row, Record");
                    rows.forEach(r => {
                        points.push({
                            REFERENCE_VALUE: parseFloat(r.querySelector("ValorReferencia, Nominal, Reference")?.textContent || 0),
                            INDICATED_VALUE: parseFloat(r.querySelector("Indicao, Indicated, Value")?.textContent || 0),
                            ERROR: parseFloat(r.querySelector("Erro, Error, Tendence")?.textContent || 0),
                            UNCERTAINTY: parseFloat(r.querySelector("Incerteza, Uncertainty")?.textContent || 0),
                            K_FACTOR: parseFloat(r.querySelector("FatorK, K, Coverage")?.textContent || 2)
                        });
                    });
                    parsedTables.push({ name, points });
                });
                
                writeLog(`Total de Tabelas: ${parsedTables.length}`);
                
                // Perform acceptance checks
                writeLog("Calculando Validação (Critérios de Aceitação)...");
                const instrument = instrumentsList.find(i => i.id === selectedInstrumentId);
                const instrumentTypeId = instrument ? instrument.ID_INSTRUMENT_TYPE : null;
                
                // Fetch limits
                let maxErrorAllowed = 5.0; // fallback default
                try {
                    const allCriteria = await tableLens.fetchTableRecords('CRITERION_ACCEPTANCE');
                    const matchedGen = allCriteria.filter(c => String(c.ID_INSTRUMENT_TYPE) === String(instrumentTypeId));
                    
                    const allIndiv = await tableLens.fetchTableRecords('CRITERION_INSTRUMENTS');
                    const matchedIndiv = allIndiv.filter(c => String(c.ID_INSTRUMENT) === String(selectedInstrumentId));
                    
                    const criteria = [...matchedIndiv, ...matchedGen];
                    if (criteria.length > 0) {
                        maxErrorAllowed = parseFloat(criteria[0].MAX_ERROR_MORE || 5.0);
                        writeLog(`Limite Máximo Encontrado: ${maxErrorAllowed}`);
                    } else {
                        writeLog(`Sem critérios cadastrados para o instrumento. Utilizando limite genérico: ${maxErrorAllowed}`);
                    }
                } catch(err) {
                    writeLog(`Erro ao buscar limites de aceitação: ${err.message}. Usando default ${maxErrorAllowed}`);
                }

                // Check points
                let allPointsValid = true;
                parsedTables.forEach(t => {
                    t.points.forEach(p => {
                        const totalError = Math.abs(p.ERROR) + p.UNCERTAINTY;
                        if (totalError > maxErrorAllowed) {
                            allPointsValid = false;
                        }
                    });
                });
                
                const validationStatus = allPointsValid ? "Aprovado" : "Reprovado";
                writeLog(`Resultado do Laudo: ${validationStatus.toUpperCase()}`);

                // Insert into Grist database
                writeLog("Inserindo certificado no banco do Grist...");
                const certResponse = await dataWriter.addRecord('EXTERNAL_CALIBRATIONS', {
                    CODE: certCode,
                    CALIBRATION_DATE: dateStr,
                    ID_LABORATORY: labName,
                    DESCRIPTION: notes,
                    VALIDATION_STATUS: validationStatus
                });
                
                if (!certResponse || !certResponse.retValues || !certResponse.retValues[0]) {
                    throw new Error("Erro ao criar cabeçalho do certificado.");
                }
                const newCertId = certResponse.retValues[0];
                writeLog(`Certificado criado com ID: ${newCertId}`);
                
                // Insert tables and points
                for (const t of parsedTables) {
                    const tableResponse = await dataWriter.addRecord('EXTERNAL_CAL_TABLES', {
                        NAME: t.name,
                        ID_EXTERNAL_CALIBRATION: newCertId
                    });
                    if (tableResponse && tableResponse.retValues && tableResponse.retValues[0]) {
                        const newTableId = tableResponse.retValues[0];
                        for (const p of t.points) {
                            await dataWriter.addRecord('EXTERNAL_CAL_RESULTS', {
                                REFERENCE_VALUE: p.REFERENCE_VALUE,
                                INDICATED_VALUE: p.INDICATED_VALUE,
                                ERROR: p.ERROR,
                                UNCERTAINTY: p.UNCERTAINTY,
                                K_FACTOR: p.K_FACTOR,
                                ID_EXTERNAL_CAL_TABLE: newTableId
                            });
                        }
                    }
                }
                writeLog("Pontos e tabelas de resultados gravados com sucesso!");

                // Update Instrument RefList
                writeLog("Conectando certificado ao Instrumento...");
                const freshInstrument = await tableLens.fetchRecordById('INSTRUMENTS', selectedInstrumentId);
                const currentRefs = freshInstrument.EXTERNAL_CALIBRATIONS || [];
                const updatedRefs = ['L', ...((Array.isArray(currentRefs) && currentRefs[0] === 'L') ? currentRefs.slice(1) : []), newCertId];
                
                await dataWriter.updateRecord('INSTRUMENTS', selectedInstrumentId, {
                    EXTERNAL_CALIBRATIONS: updatedRefs,
                    METROLOGICAL_STAGE: "1. Planejado",
                    ID_STATUS: 1
                });
                
                writeLog("🔗 Relacionamento bidirecional atualizado!");
                showMessage(`Calibração importada e vinculada com sucesso! Status: ${validationStatus}`);
                
                // Request refresh of visual components
                if (window.grist) {
                    window.grist.docApi.fetchTable('INSTRUMENTS');
                }
            } catch(e) {
                showMessage("Falha na Importação: " + e.message, true);
                writeLog("Erro: " + e.stack);
            }
        }
    </script>
</body>
</html>
