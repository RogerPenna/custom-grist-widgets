<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Configuração Grist</title>
    <script src="libraries/external/grist-plugin-api.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 { color: #333; font-size: 1.5em; }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .status { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de Configuração</h1>
        <p class="status">Aguardando Handshake do Grist...</p>
        <div id="output">As opções salvas aparecerão aqui.</div>
    </div>

    <script>
        const statusEl = document.querySelector('.status');
        const outputEl = document.getElementById('output');

        // Inicializa a API do Grist
        grist.ready({
            requiredAccess: 'full',
            onEditOptions: () => {
                const val = prompt('Digite algo para salvar nas opções do widget:');
                if (val) {
                    grist.setOptions({ teste_key: val });
                }
            }
        });

        // Escuta por mudanças nas opções (configurações do widget)
        grist.onOptions((options) => {
            console.log("[Teste Grist] onOptions recebido:", options);
            statusEl.textContent = "Conectado ao Grist!";
            outputEl.textContent = "Opções Recebidas:\n" + JSON.stringify(options, null, 2);
        });
    </script>
</body>
</html>
