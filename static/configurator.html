<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador de Páginas</title>
    
    <link rel="stylesheet" href="/static/libraries/grist-config-manager/ConfigManagerComponent.css">
    <link rel="stylesheet" href="/static/libraries/grist-field-renderer/styles/renderer-styles.css">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Manrope', sans-serif;
            background-color: #f8fafc;
        }
        #configurator-container {
            width: 100%; height: 100vh;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .grf-cm-main-container {
            height: auto !important;
            min-height: 80vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
        }
    </style>
</head>
<body>
    <div id="configurator-container">
        <div id="loading-msg">Iniciando Configurador...</div>
    </div>

    <script type="module">
        // Usando caminhos absolutos para evitar erros de MIME type do Streamlit
        import { GristRestAdapter } from '/static/libraries/headless-rest-adapter.js';
        import { renderMainUI } from '/static/libraries/grist-config-manager/ConfigManagerComponent.js';

        async function init() {
            const container = document.getElementById('configurator-container');
            const urlParams = new URLSearchParams(window.location.search);
            
            const gristUrl = urlParams.get('gristUrl');
            const docId = urlParams.get('docId');
            const apiKey = urlParams.get('apiKey');

            if (!gristUrl || !docId || !apiKey) {
                container.innerHTML = '<div style="color: red; padding: 20px;">Erro: Faltam credenciais do Grist na URL.</div>';
                return;
            }

            try {
                const adapter = new GristRestAdapter({ gristUrl, docId, apiKey });
                
                adapter.docApi.listTables = async () => {
                    const url = `${gristUrl.replace(/\/$/, '')}/api/docs/${docId}/tables`;
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                    const data = await res.json();
                    return data.tables.map(t => t.id);
                };

                window.grist = {
                    docApi: adapter.docApi,
                    ready: () => {},
                    onOptions: () => {},
                    onRecords: () => {},
                    setOptions: () => {}
                };

                container.innerHTML = ''; 
                await renderMainUI(container, null, ['Card System', 'Drawer', 'Card Style', 'Table', 'BSC']);
                
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="color: red; padding: 20px;">Erro ao carregar dados do Grist: ' + err.message + '</div>';
            }
        }

        init();
    </script>
</body>
</html>
