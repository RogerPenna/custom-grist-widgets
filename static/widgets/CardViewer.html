<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Viewer - Modo Robusto</title>
    <script src="../libraries/external/grist-plugin-api.js"></script>
    <script src="../libraries/external/sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../libraries/grist-config-manager/ConfigManagerComponent.css">
    <link rel="stylesheet" href="../libraries/grist-style-utils/icons.css">
    <link rel="stylesheet" href="../libraries/grist-style-utils/night-theme.css">
    <link href="../libraries/tabulator/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="../libraries/tabulator/tabulator.min.js"></script>
    
    <style>
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; background-color: #f7f7f7; overflow: hidden; }
        #app-container { width: 100%; height: 100%; overflow-y: auto; padding: 0; box-sizing: border-box; }
        .status-placeholder { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 18px; font-weight: bold; color: #666; }
        
        /* Estilos do Botão de Engrenagem (Settings Gear) */
        #settings-gear-btn { position: fixed; top: 10px; right: 10px; width: 32px; height: 32px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: all 0.2s; font-size: 20px; }
        #settings-gear-btn:hover { background: white; transform: rotate(45deg); scale: 1.1; }
        
        /* Estilos do Popover de Configuração */
        .config-popover { position: fixed; top: 50px; right: 10px; width: 250px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 10001; padding: 15px; font-family: 'Manrope', sans-serif; }
        .popover-section { margin-bottom: 12px; }
        .popover-section label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .popover-section input { width: 100%; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .config-popover-btn { width: 100%; padding: 8px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 8px; font-size: 12px; }
        .config-popover-btn:hover { background: #2563eb; }
        .theme-toggle-group { display: flex; gap: 5px; }
        .theme-toggle-group button { flex: 1; font-size: 10px; padding: 4px; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; border-radius: 4px; cursor: pointer; }
        .theme-toggle-group button.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* Estilos do Botão de Adição Global (Círculo Discreto) */
        .grf-global-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            margin: 10px auto;
            background-color: #ffffff;
            color: #3b82f6;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 20px;
            font-weight: 400;
            line-height: 1;
            padding: 0;
        }
        .grf-global-add-btn:hover {
            background-color: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }
        .grf-global-add-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
        }
        
        .empty-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #94a3b8;
            font-family: 'Manrope', sans-serif;
        }

        .cards-wrapper {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="filter-bar-container"></div>
        <div id="cards-content-area">
            <div class="status-placeholder">Aguardando inicialização do Grist...</div>
        </div>
    </div>

    <!-- CARREGA A LÓGICA PRINCIPAL DO WIDGET -->
    <script type="module" src="CardViewer.js"></script>
</body>
</html>
